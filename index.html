<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 전국 점검지도</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        #map { width: 100%; height: 100vh; background: #eee; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 260px; border: 2px solid #fae100;
        }
        #upload-box h3 { margin: 0 0 10px 0; font-size: 15px; }
        #excel-file { width: 100%; font-size: 13px; margin-bottom: 10px; }
        button {
            width: 100%; padding: 10px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; margin-top: 6px; font-size: 14px;
        }
        #upload-btn { background: #007bff; color: white; padding: 12px; }
        #loc-watch-btn { background: #28a745; color: white; } /* 내 위치 추적 버튼 */
        #clear-btn { background: #dc3545; color: white; font-size: 12px; }
        #status { margin-top: 12px; font-size: 12px; font-weight: bold; color: #333; line-height: 1.4; }
        
        /* 내 위치 표시용 커스텀 오버레이 스타일 */
        .my-loc-dot {
            width: 15px; height: 15px; background: #007bff;
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,123,255,0.8);
        }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3>🌍 전국 점검 데이터 등록</h3>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">지도에 표시하기</button>
        <button id="loc-watch-btn">📍 내 위치 추적 시작</button>
        <button id="clear-btn">🗑 데이터 초기화</button>
        <div id="status">지도 연결 확인 중...</div>
    </div>
    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer&autoload=false"></script>
    
    <script>
        var map, clusterer, geocoder, watchId = null;
        var myLocMarker = null; // 내 실시간 위치 표시용

        kakao.maps.load(function() {
            initMap();
        });

        function initMap() {
            var statusEl = document.getElementById('status');
            statusEl.innerText = '✅ 준비 완료';

            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(36.3, 127.5),
                level: 12
            });
            clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
            geocoder = new kakao.maps.services.Geocoder();

            // 저장 데이터 복원
            try {
                var saved = localStorage.getItem('kesco_map_data');
                if (saved) drawMarkers(JSON.parse(saved));
            } catch (e) {}

            document.getElementById('upload-btn').onclick = processExcel;
            document.getElementById('loc-watch-btn').onclick = toggleWatchLocation;
            document.getElementById('clear-btn').onclick = clearData;
        }

        // [핵심] 실시간 위치 추적 토글 함수
        function toggleWatchLocation() {
            var btn = document.getElementById('loc-watch-btn');
            var statusEl = document.getElementById('status');

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                if (myLocMarker) myLocMarker.setMap(null);
                btn.innerText = "📍 내 위치 추적 시작";
                btn.style.background = "#28a745";
                statusEl.innerText = "내 위치 추적 중단";
