<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 전국 점검지도</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        #map { width: 100%; height: 100vh; background: #eee; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 260px; border: 2px solid #fae100;
        }
        #upload-box h3 { margin: 0 0 10px 0; font-size: 15px; }
        #excel-file { width: 100%; font-size: 13px; margin-bottom: 10px; }
        #upload-btn {
            width: 100%; padding: 12px; background: #007bff; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        #upload-btn:hover { background: #0056b3; }
        #my-location-btn {
            width: 100%; padding: 10px; background: #28a745; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px;
        }
        #clear-btn {
            width: 100%; padding: 8px; background: #dc3545; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 6px; font-size: 13px;
        }
        #status { margin-top: 12px; font-size: 13px; font-weight: bold; color: #333; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3>🌍 전국 점검 데이터 등록</h3>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">지도에 표시하기</button>
        <button id="my-location-btn">📍 내 위치 보기</button>
        <button id="clear-btn">🗑 데이터 초기화</button>
        <div id="status">지도 연결 확인 중...</div>
    </div>
    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer&autoload=false"></script>
    
    <script>
        var map, clusterer, geocoder, myLocationMarker;

        // 1. 카카오 지도 SDK 로딩 대기
        kakao.maps.load(function() {
            initMap();
        });

        function initMap() {
            var statusEl = document.getElementById('status');
            statusEl.innerText = '✅ 준비 완료';

            var mapContainer = document.getElementById('map');
            var mapOption = {
                center: new kakao.maps.LatLng(36.3, 127.5),
                level: 12
            };

            map = new kakao.maps.Map(mapContainer, mapOption);
            clusterer = new kakao.maps.MarkerClusterer({
                map: map, averageCenter: true, minLevel: 7
            });
            geocoder = new kakao.maps.services.Geocoder();

            // 기존 데이터 복원
            try {
                var saved = localStorage.getItem('kesco_map_data');
                if (saved) {
                    var savedData = JSON.parse(saved);
                    drawMarkers(savedData);
                    statusEl.innerText = '✅ ' + savedData.length + '건 복원됨';
                }
            } catch (e) { console.error("복원 실패", e); }

            // 이벤트 바인딩
            document.getElementById('upload-btn').onclick = processExcel;
            document.getElementById('my-location-btn').onclick = showMyLocation;
            document.getElementById('clear-btn').onclick = clearData;
        }

        function drawMarkers(sites) {
            clusterer.clear();
            var markers = sites.map(function (s) {
                var marker = new kakao.maps.Marker({
                    position: new kakao.maps.LatLng(s.lat, s.lng)
                });

                var iwContent = 
                    '<div style="padding:10px;font-size:12px;width:200px;">' +
                    '<b>' + s.title + '</b><br>' +
                    '<span style="color:#555;">' + s.address + '</span>' +
                    (s.memo ? '<br><span style="color:#888;font-size:11px;">' + s.memo + '</span>' : '') +
                    '<a href="https://map.kakao.com/link/to/' + encodeURIComponent(s.title) + ',' + s.lat + ',' + s.lng + '"' +
                    ' target="_blank" style="display:block;margin-top:8px;background:#fae100;text-align:center;' +
                    'padding:7px;border-radius:4px;text-decoration:none;color:black;font-weight:bold;">길찾기</a>' +
                    '</div>';

                var iw = new kakao.maps.InfoWindow({ content: iwContent, removable: true });
                kakao.maps.event.addListener(marker, 'click', function () { iw.open(map, marker); });
                return marker;
            });

            clusterer.addMarkers(markers);
            if (markers.length > 0) {
                map.setCenter(markers[0].getPosition());
                map.setLevel(9);
            }
        }

        function processExcel() {
            var statusEl = document.getElementById('status');
            var file = document.getElementById('excel-file').files[0];
            if (!file) { alert('파일을 먼저 선택하세요!'); return; }

            statusEl.innerText = '파일 분석 중...';
            var reader = new FileReader();
            reader.onload = function (e) {
                var workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                var successData = [];
                var count = 0;
                var total = json.length;

                if (total === 0) { statusEl.innerText = '⚠️ 데이터가 없습니다.'; return; }

                json.forEach(function (row, i) {
                    setTimeout(function () {
                        var addr = row['주소'] || row['address'] || '';
                        if (addr) {
                            geocoder.addressSearch(addr, function (res, stat) {
                                if (stat === kakao.maps.services.Status.OK) {
                                    successData.push({
                                        title: row['상호명'] || row['대상처명'] || row['name'] || '이름없음',
                                        lat: res[0].y, lng: res[0].x, address: addr,
                                        memo: row['비고'] || row['memo'] || ''
                                    });
                                }
                                count++;
                                statusEl.innerText = '변환 중... (' + count + '/' + total + ')';
                                if (count === total) {
                                    localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                    drawMarkers(successData);
                                    statusEl.innerText = '✅ 완료: ' + successData.length + '건 표시';
                                }
                            });
                        } else {
                            count++;
                            if (count === total) {
                                localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                drawMarkers(successData);
                                statusEl.innerText = '✅ 완료: ' + successData.length + '건 표시';
                            }
                        }
                    }, i * 40); // 2000건 대비 적정 지연시간
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function showMyLocation() {
            var statusEl = document.getElementById('status');
            if (!navigator.geolocation) { alert('위치 서비스를 지원하지 않습니다.'); return; }
            statusEl.innerText = '📡 위치 확인 중...';
            navigator.geolocation.getCurrentPosition(function (pos) {
                var locPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                if (myLocationMarker) myLocationMarker.setMap(null);
                
                myLocationMarker = new kakao.maps.Marker({
                    position: locPos,
                    map: map,
                    image: new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png', new kakao.maps.Size(24, 35))
                });
                
                new kakao.maps.InfoWindow({ content: '<div style="padding:8px;font-size:12px;">📍 내 현재 위치</div>', removable: true }).open(map, myLocationMarker);
                map.setCenter(locPos);
                map.setLevel(5);
                statusEl.innerText = '✅ 내 위치 표시됨';
            }, function () { statusEl.innerText = '⚠️ 위치 권한을 허용해주세요.'; });
        }

        function clearData() {
            if (confirm('저장된 데이터를 초기화할까요?')) {
                localStorage.removeItem('kesco_map_data');
                location.reload();
            }
        }
    </script>
</body>
</html>
