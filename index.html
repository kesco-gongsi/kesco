<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 점검데이터 위치 표시</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer&autoload=false"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; }

        /* 메뉴창 스타일 (다크 모드) */
        #upload-box {
            position: absolute; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(33, 33, 33, 0.95); color: white;
            padding: 15px; border-radius: 12px; width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease; /* 접히는 애니메이션 */
        }

        /* 메뉴가 접혔을 때의 스타일 */
        #upload-box.collapsed { height: 30px; width: 120px; overflow: hidden; padding: 10px 15px; }

        #toggle-btn {
            float: right; cursor: pointer; background: #444; border: none;
            color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 4px;
        }

        h3 { margin: 0 0 10px 0; font-size: 16px; display: inline-block; }
        input[type="file"] { width: 100%; margin: 10px 0; font-size: 12px; }
        
        .btn {
            width: 100%; padding: 10px; margin-bottom: 8px; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        #upload-btn { background: #2563eb; color: white; }
        #track-btn { background: #92400e; color: white; }
        #clear-btn { background: #991b1b; color: white; }
        #status { margin-top: 10px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>
    <div id="upload-box">
        <button id="toggle-btn" onclick="toggleMenu()">접기 ▲</button>
        <h3>🌍 점검데이터 위치</h3>
        
        <div id="menu-content">
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <button id="upload-btn" class="btn">지도에 표시하기</button>
            <button id="track-btn" class="btn">📡 위치 추적 시작</button>
            <button id="clear-btn" class="btn">🗑️ 데이터 초기화</button>
            <div id="status">📡 실시간 위치 수신 대기 중...</div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        var map, clusterer, geocoder, locMarker;
        var watchId = null;

        // 메뉴 접기/펴기 함수
        function toggleMenu() {
            var box = document.getElementById('upload-box');
            var btn = document.getElementById('toggle-btn');
            box.classList.toggle('collapsed');
            btn.innerText = box.classList.contains('collapsed') ? '메뉴 펴기 ▼' : '접기 ▲';
        }

        kakao.maps.load(function() {
            var mapContainer = document.getElementById('map');
            map = new kakao.maps.Map(mapContainer, { center: new kakao.maps.LatLng(36.35, 127.38), level: 10 });
            clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
            geocoder = new kakao.maps.services.Geocoder();

            // 저장 데이터 불러오기
            var saved = localStorage.getItem('kesco_map_data');
            if(saved) drawMarkers(JSON.parse(saved));

            // 등록 버튼
            document.getElementById('upload-btn').onclick = function() {
                var file = document.getElementById('excel-file').files[0];
                if(!file) return alert("파일을 선택하세요!");
                
                var reader = new FileReader();
                reader.onload = function(e) {
                    var workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    var successData = [];
                    var count = 0;
                    
                    json.forEach(function(row, i) {
                        setTimeout(function() {
                            if(row['주소']) {
                                geocoder.addressSearch(row['주소'], function(res, stat) {
                                    if(stat === kakao.maps.services.Status.OK) {
                                        successData.push({
                                            title: row['상호명'] || row['대상처명'] || '이름없음',
                                            lat: res[0].y, lng: res[0].x, addr: row['주소'], memo: row['비고'] || ''
                                        });
                                    }
                                    count++;
                                    if(count === json.length) {
                                        localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                        drawMarkers(successData);
                                        toggleMenu(); // 등록 완료 시 자동으로 접기
                                    }
                                });
                            } else { count++; }
                        }, i * 30);
                    });
                };
                reader.readAsArrayBuffer(file);
            };

            // 위치 추적 버튼
            document.getElementById('track-btn').onclick = function() {
                if(watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                    this.innerText = "📡 위치 추적 시작";
                    this.style.background = "#92400e";
                    if(locMarker) locMarker.setMap(null);
                } else {
                    if(navigator.geolocation) {
                        watchId = navigator.geolocation.watchPosition(function(pos) {
                            var lat = pos.coords.latitude, lng = pos.coords.longitude;
                            var moveLoc = new kakao.maps.LatLng(lat, lng);
                            if(!locMarker) {
                                locMarker = new kakao.maps.Marker({ 
                                    position: moveLoc, 
                                    image: new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png', new kakao.maps.Size(30, 30))
                                });
                                locMarker.setMap(map);
                            } else { locMarker.setPosition(moveLoc); }
                            map.setCenter(moveLoc);
                        });
                        this.innerText = "🛑 추적 중단";
                        this.style.background = "#444";
                    }
                }
            };

            // 초기화 버튼
            document.getElementById('clear-btn').onclick = function() {
                if(confirm("모든 데이터를 삭제할까요?")) {
                    localStorage.removeItem('kesco_map_data');
                    clusterer.clear();
                    location.reload();
                }
            };
        });

        function drawMarkers(sites) {
            clusterer.clear();
            var markers = sites.map(function(s) {
                var m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng) });
                var iw = new kakao.maps.InfoWindow({ 
                    content: '<div style="padding:10px;font-size:12px;color:#000;"><b>'+s.title+'</b><br>'+s.addr+'<br><a href="https://map.kakao.com/link/to/'+s.title+','+s.lat+','+s.lng+'" target="_blank" style="display:block;margin-top:5px;background:#fae100;text-align:center;padding:5px;border-radius:4px;text-decoration:none;color:black;">길찾기</a></div>', 
                    removable: true 
                });
                kakao.maps.event.addListener(m, 'click', function() { iw.open(map, m); });
                return m;
            });
            clusterer.addMarkers(markers);
            if(markers.length > 0) map.setCenter(markers[0].getPosition());
        }
    </script>
</body>
</html>
