<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 현장 점검지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer&autoload=false"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; }

        /* 메뉴창 스타일 */
        #upload-box {
            position: absolute; top: 10px; left: 10px; z-index: 1001; 
            background: rgba(20, 20, 20, 0.9); color: white;
            padding: 15px; border-radius: 12px; width: 260px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            transition: all 0.3s ease; border: 1px solid #444;
        }
        #upload-box.collapsed { height: 35px; width: 100px; overflow: hidden; padding: 8px 12px; background: rgba(0,0,0,0.8); }

        #toggle-btn {
            float: right; cursor: pointer; background: #fae100; border: none;
            color: #000; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: bold;
        }

        h3 { margin: 0 0 10px 0; font-size: 15px; color: #fae100; }
        .btn {
            width: 100%; padding: 10px; margin-bottom: 6px; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px;
        }
        #upload-btn { background: #2563eb; color: white; }
        #track-btn { background: #059669; color: white; }
        #clear-btn { background: #b91c1c; color: white; }
        #status { margin-top: 8px; font-size: 11px; color: #aaa; text-align: center; }

        /* 말풍선 내 삭제 버튼 스타일 */
        .del-btn {
            display: block; margin-top: 8px; background: #ff4d4d; color: white;
            text-align: center; padding: 6px; border-radius: 4px; text-decoration: none;
            font-size: 11px; font-weight: bold; border: none; width: 100%;
        }
    </style>
</head>
<body>
    <div id="upload-box">
        <button id="toggle-btn" onclick="toggleMenu()">접기 ▲</button>
        <h3>📊 점검 관리</h3>
        <div id="menu-content">
            <input type="file" id="excel-file" accept=".xlsx, .xls" style="font-size:11px; margin-bottom:10px;">
            <button id="upload-btn" class="btn">📍 엑셀 데이터 등록</button>
            <button id="track-btn" class="btn">📡 위치 추적 시작</button>
            <button id="clear-btn" class="btn">🔄 전체 초기화</button>
            <div id="status">지도가 준비되었습니다.</div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        var map, clusterer, geocoder, myLocCircle;
        var watchId = null;
        var currentSites = [];

        function toggleMenu() {
            var box = document.getElementById('upload-box');
            var btn = document.getElementById('toggle-btn');
            box.classList.toggle('collapsed');
            btn.innerText = box.classList.contains('collapsed') ? '메뉴 펴기' : '접기 ▲';
        }

        kakao.maps.load(function() {
            map = new kakao.maps.Map(document.getElementById('map'), { 
                center: new kakao.maps.LatLng(35.9180, 127.1241), 
                level: 8 
            });
            
            // 1. 클러스터러 설정 (겹칠 때 숫자 표시)
            clusterer = new kakao.maps.MarkerClusterer({
                map: map,
                averageCenter: true,
                minLevel: 6,
                disableClickZoom: false,
                styles: [{
                    width : '40px', height : '40px',
                    background: 'rgba(250, 225, 0, 0.9)',
                    borderRadius: '20px', color: '#000',
                    textAlign: 'center', fontWeight: 'bold',
                    lineHeight: '41px'
                }]
            });

            geocoder = new kakao.maps.services.Geocoder();

            var saved = localStorage.getItem('kesco_map_data');
            if(saved) {
                currentSites = JSON.parse(saved);
                drawMarkers();
            }

            // [등록 버튼]
            document.getElementById('upload-btn').onclick = function() {
                var file = document.getElementById('excel-file').files[0];
                if(!file) return alert("파일을 선택해주세요.");
                
                var reader = new FileReader();
                reader.onload = function(e) {
                    var workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    var successData = [];
                    var count = 0;
                    
                    json.forEach(function(row, i) {
                        setTimeout(function() {
                            var addr = row['주소'];
                            if(addr) {
                                geocoder.addressSearch(addr, function(res, stat) {
                                    if(stat === kakao.maps.services.Status.OK) {
                                        successData.push({
                                            id: Date.now() + i, // 고유 ID 부여
                                            title: row['상호명'] || '이름없음',
                                            lat: res[0].y, lng: res[0].x, addr: addr
                                        });
                                    }
                                    count++;
                                    document.getElementById('status').innerText = "변환 중: " + count + "/" + json.length;
                                    if(count === json.length) {
                                        currentSites = successData;
                                        saveAndRender();
                                        toggleMenu();
                                    }
                                });
                            } else { count++; }
                        }, i * 30);
                    });
                };
                reader.readAsArrayBuffer(file);
            };

            // [위치 추적 버튼]
            document.getElementById('track-btn').onclick = function() {
                if(watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                    if(myLocCircle) myLocCircle.setMap(null);
                    this.innerText = "📡 위치 추적 시작";
                    this.style.background = "#059669";
                } else {
                    if(navigator.geolocation) {
                        watchId = navigator.geolocation.watchPosition(function(pos) {
                            var moveLoc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                            // 2. 내 위치 원형 마커로 표시
                            if(!myLocCircle) {
                                myLocCircle = new kakao.maps.Circle({
                                    center: moveLoc,
                                    radius: 15,
                                    strokeWeight: 2,
                                    strokeColor: '#FFFFFF',
                                    strokeOpacity: 1,
                                    fillColor: '#2563eb',
                                    fillOpacity: 1
                                });
                                myLocCircle.setMap(map);
                            } else { myLocCircle.setCenter(moveLoc); }
                            map.setCenter(moveLoc);
                        });
                        this.innerText = "🛑 추적 중단";
                        this.style.background = "#444";
                    }
                }
            };

            // [초기화 버튼]
            document.getElementById('clear-btn').onclick = function() {
                if(confirm("모든 데이터를 삭제하시겠습니까?")) {
                    localStorage.removeItem('kesco_map_data');
                    location.reload();
                }
            };
        });

        // 4. 마커 삭제 기능을 포함한 그리기 함수
        function drawMarkers() {
            clusterer.clear();
            var markers = currentSites.map(function(s) {
                var m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng) });
                
                var content = document.createElement('div');
                content.style.padding = '10px';
                content.style.background = 'white';
                content.style.borderRadius = '8px';
                content.style.fontSize = '12px';
                content.style.width = '180px';
                content.style.color = '#000';
                content.innerHTML = '<b>'+s.title+'</b><br>'+s.addr +
                                    '<a href="https://map.kakao.com/link/to/'+s.title+','+s.lat+','+s.lng+'" target="_blank" style="display:block;margin-top:8px;background:#fae100;text-align:center;padding:6px;border-radius:4px;text-decoration:none;color:black;font-weight:bold;">길찾기</a>';
                
                var delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.innerText = '✅ 점검 완료 (삭제)';
                delBtn.onclick = function() {
                    if(confirm("이 마커를 삭제하시겠습니까?")) {
                        currentSites = currentSites.filter(function(item) { return item.id !== s.id; });
                        saveAndRender();
                    }
                };
                content.appendChild(delBtn);

                var iw = new kakao.maps.InfoWindow({ content: content, removable: true });
                kakao.maps.event.addListener(m, 'click', function() { iw.open(map, m); });
                return m;
            });
            clusterer.addMarkers(markers);
        }

        function saveAndRender() {
            localStorage.setItem('kesco_map_data', JSON.stringify(currentSites));
            drawMarkers();
            document.getElementById('status').innerText = currentSites.length + "개의 마커 표시 중";
        }
    </script>
</body>
</html>
