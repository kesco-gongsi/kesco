<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 전국 점검지도</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        #map { width: 100%; height: 100vh; background: #eee; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 260px; border: 2px solid #fae100;
        }
        #upload-box h3 { margin: 0 0 10px 0; font-size: 15px; }
        #excel-file { width: 100%; font-size: 12px; margin-bottom: 10px; }
        button {
            width: 100%; padding: 10px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; margin-top: 6px; font-size: 14px;
        }
        #upload-btn { background: #007bff; color: white; padding: 12px; }
        #loc-watch-btn { background: #28a745; color: white; }
        #clear-btn { background: #dc3545; color: white; font-size: 12px; }
        #status { margin-top: 12px; font-size: 12px; font-weight: bold; color: #333; line-height: 1.4; }
        
        .my-loc-dot {
            width: 18px; height: 18px; background: #007bff;
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,123,255,0.8);
        }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3>🌍 전국 점검 데이터 등록</h3>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">지도에 표시하기</button>
        <button id="loc-watch-btn">📍 내 위치 추적 시작</button>
        <button id="clear-btn">🗑 데이터 초기화</button>
        <div id="status">지도 연결 확인 중...</div>
    </div>
    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer&autoload=false"></script>
    
    <script>
        var map, clusterer, geocoder, watchId = null;
        var myLocMarker = null;

        // 1. 지도 로드 대기
        kakao.maps.load(function() {
            initMap();
        });

        function initMap() {
            var statusEl = document.getElementById('status');
            statusEl.innerText = '✅ 준비 완료';

            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(36.35, 127.5),
                level: 12
            });
            clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
            geocoder = new kakao.maps.services.Geocoder();

            // 저장 데이터 복원
            try {
                var saved = localStorage.getItem('kesco_map_data');
                if (saved) drawMarkers(JSON.parse(saved));
            } catch (e) {}

            document.getElementById('upload-btn').onclick = processExcel;
            document.getElementById('loc-watch-btn').onclick = toggleWatchLocation;
            document.getElementById('clear-btn').onclick = clearData;
        }

        // 2. 실시간 위치 추적 (마커와 동시에 보기 가능)
        function toggleWatchLocation() {
            var btn = document.getElementById('loc-watch-btn');
            var statusEl = document.getElementById('status');

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                if (myLocMarker) myLocMarker.setMap(null);
                myLocMarker = null;
                btn.innerText = "📍 내 위치 추적 시작";
                btn.style.background = "#28a745";
                statusEl.innerText = "내 위치 추적 중단됨";
            } else {
                if (!navigator.geolocation) { alert("위치 정보를 지원하지 않습니다."); return; }
                btn.innerText = "🛑 추적 중단";
                btn.style.background = "#ffc107";
                btn.style.color = "black";

                watchId = navigator.geolocation.watchPosition(function(pos) {
                    var locPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    if (!myLocMarker) {
                        myLocMarker = new kakao.maps.CustomOverlay({
                            position: locPos,
                            content: '<div class="my-loc-dot"></div>',
                            map: map
                        });
                        map.setCenter(locPos); // 처음 활성화 시 내 위치로 이동
                        map.setLevel(5);
                    } else {
                        myLocMarker.setPosition(locPos);
                    }
                    statusEl.innerText = "📡 실시간 위치 수신 중...";
                }, function(err) {
                    statusEl.innerText = "⚠️ 위치 수신 실패 (권한 확인)";
                }, { enableHighAccuracy: true });
            }
        }

        // 3. 마커 그리기 (전국 어디든 첫 주소로 자동 이동)
        function drawMarkers(sites) {
            clusterer.clear();

                var iwContent = '<div style="padding:10px;font-size:12px;width:200px;">' +
                                '<b>' + s.title + '</b><br><span style="color:#555;">' + s.address + '</span>' +
                                '<a href="https://map.kakao.com/link/to/' + encodeURIComponent(s.title) + ',' + s.lat + ',' + s.lng + '" target="_blank" style="display:block;margin-top:8px;background:#fae100;text-align:center;padding:7px;border-radius:4px;text-decoration:none;color:black;font-weight:bold;">길찾기</a></div>';
                var iw = new kakao.maps.InfoWindow({ content: iwContent, removable: true });
